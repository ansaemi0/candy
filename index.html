<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Roulette - Casino</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0514 50%, #000008 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      color: #FFD700;
    }

    /* ── Starfield ── */
    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur, 2s) ease-in-out infinite alternate;
      opacity: 0.15;
    }
    @keyframes twinkle {
      from { opacity: 0.05; transform: scale(0.8); }
      to   { opacity: 0.9;  transform: scale(1.2); }
    }

    /* ── App wrapper ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 20px;
    }

    /* ── Title ── */
    .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-align: center;
      color: #FFD700;
      text-shadow:
        0 0 8px  #FFD700,
        0 0 20px #FFA500,
        0 0 50px #FF6600,
        0 0 100px rgba(255,100,0,0.4);
      line-height: 1.2;
    }
    .title span {
      color: #fff;
      text-shadow:
        0 0 8px  #fff,
        0 0 25px #FFD700,
        0 0 50px #FFA500;
    }

    /* ── Decorative divider ── */
    .divider {
      width: 300px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #FFD700 30%, #FFA500 50%, #FFD700 70%, transparent);
      box-shadow: 0 0 10px #FFD700;
    }

    /* ── Wheel container ── */
    #wheel-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel-shadow {
      position: absolute;
      border-radius: 50%;
      box-shadow:
        0 0 0 5px #8B6914,
        0 0 0 8px #FFD700,
        0 0 0 12px #8B6914,
        0 0 50px rgba(255,215,0,0.6),
        0 0 100px rgba(255,165,0,0.3),
        0 0 200px rgba(255,100,0,0.15);
    }

    #wheel-canvas {
      display: block;
      border-radius: 50%;
      cursor: default;
    }

    /* ── Pointer ── */
    #pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 32px solid #FF2200;
      filter: drop-shadow(0 0 8px #FF4400) drop-shadow(0 -2px 4px rgba(255,50,0,0.8));
      z-index: 10;
    }

    /* ── Spin button ── */
    #spin-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1rem, 3vw, 1.3rem);
      letter-spacing: 0.25em;
      color: #0a0a0f;
      background: linear-gradient(135deg, #FFE44D 0%, #FFD700 30%, #FFA500 70%, #FF8C00 100%);
      border: none;
      border-radius: 6px;
      padding: 16px 64px;
      cursor: pointer;
      box-shadow:
        0 0 20px rgba(255,215,0,0.7),
        0 0 40px rgba(255,165,0,0.4),
        0 4px 15px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.1s ease, box-shadow 0.2s ease, filter 0.2s;
      animation: btn-pulse 2.5s ease-in-out infinite;
      text-transform: uppercase;
    }
    #spin-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 0 35px rgba(255,215,0,0.9),
        0 0 70px rgba(255,165,0,0.5),
        0 6px 20px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }
    #spin-btn:active:not(:disabled) {
      transform: translateY(1px) scale(0.98);
    }
    #spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.7), 0 0 40px rgba(255,165,0,0.4), 0 4px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3); }
      50%       { box-shadow: 0 0 35px rgba(255,215,0,1.0), 0 0 80px rgba(255,100,0,0.6), 0 4px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.3); }
    }

    /* ── Result banner ── */
    #result-banner {
      min-width: 280px;
      text-align: center;
      padding: 12px 28px;
      background: linear-gradient(135deg, rgba(20,5,40,0.95), rgba(10,5,25,0.95));
      border: 1px solid #FFD700;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255,215,0,0.4), 0 0 50px rgba(255,165,0,0.2);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }
    #result-banner.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #result-text {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px #FFD700;
    }

    /* ── Modal overlay ── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 10, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #modal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #modal-box {
      background: linear-gradient(160deg, #120825 0%, #0a0518 50%, #180830 100%);
      border: 2px solid #FFD700;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow:
        0 0 0 1px #8B6914,
        0 0 40px rgba(255,215,0,0.5),
        0 0 80px rgba(255,165,0,0.3),
        0 0 160px rgba(255,100,0,0.15),
        0 20px 60px rgba(0,0,0,0.8);
      transform: scale(0.5) rotate(-5deg);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 90vw;
    }
    #modal.visible #modal-box {
      transform: scale(1) rotate(0deg);
    }

    .modal-congrats {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #fff;
      letter-spacing: 0.15em;
      text-shadow: 0 0 15px #FFD700, 0 0 30px #FFA500;
      margin-bottom: 16px;
    }

    #modal-prize {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 900;
      color: #FFD700;
      text-shadow:
        0 0 15px #FFD700,
        0 0 40px #FFA500,
        0 0 80px #FF6600;
      letter-spacing: 0.05em;
      margin: 8px 0 20px;
      animation: prize-shine 1.5s ease-in-out infinite alternate;
    }
    @keyframes prize-shine {
      from { text-shadow: 0 0 15px #FFD700, 0 0 40px #FFA500, 0 0 80px #FF6600; filter: brightness(1); }
      to   { text-shadow: 0 0 25px #FFE066, 0 0 60px #FFD700, 0 0 120px #FFA500; filter: brightness(1.2); }
    }

    .modal-subtitle {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: rgba(255,215,0,0.7);
      letter-spacing: 0.2em;
      margin-bottom: 32px;
    }

    #modal-close {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: #0a0a0f;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      border: none;
      border-radius: 6px;
      padding: 12px 36px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,215,0,0.5), 0 4px 12px rgba(0,0,0,0.5);
      transition: transform 0.15s ease, box-shadow 0.2s;
    }
    #modal-close:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 0 30px rgba(255,215,0,0.8), 0 6px 16px rgba(0,0,0,0.6);
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      top: -10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      animation: confetti-fall var(--dur) linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
    }

    /* ── Scroll bars hidden ── */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div id="stars"></div>

<div id="app">
  <h1 class="title">Lucky<br><span>Roulette</span></h1>
  <div class="divider"></div>

  <div id="wheel-wrap">
    <div id="wheel-shadow"></div>
    <div id="pointer"></div>
    <canvas id="wheel-canvas"></canvas>
  </div>

  <button id="spin-btn">SPIN</button>

  <div id="result-banner">
    <span id="result-text"></span>
  </div>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modal-box">
    <div class="modal-congrats">🎰 축하합니다! 🎰</div>
    <div id="modal-prize"></div>
    <div class="modal-subtitle">당첨 · WINNER · 当選</div>
    <button id="modal-close">다시 돌리기</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS & CONFIG
// ─────────────────────────────────────────────
const PRIZES = [
  { label: '1원',    color: '#1a1a3e', textColor: '#FFD700' },
  { label: '십원',   color: '#c8960c', textColor: '#1a0a00' },
  { label: '백원',   color: '#8b0000', textColor: '#FFD700' },
  { label: '천원',   color: '#4a0080', textColor: '#FFD700' },
  { label: '만원',   color: '#003580', textColor: '#FFD700' },
  { label: '십만원', color: '#005c2e', textColor: '#FFD700' },
  { label: '백만원', color: '#8b3000', textColor: '#FFD700' },
  { label: '천만원', color: '#8b0020', textColor: '#FFE066' },
];
const SLICE_COUNT    = 8;
const SLICE_ANGLE    = (2 * Math.PI) / SLICE_COUNT;
const FRICTION       = 0.985;
const MIN_ROTATIONS  = 6;
const STOP_THRESHOLD = 0.004;

// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas  = document.getElementById('wheel-canvas');
const ctx     = canvas.getContext('2d');
const shadow  = document.getElementById('wheel-shadow');

let RADIUS, CX, CY;

function resizeCanvas() {
  const size = Math.min(window.innerWidth * 0.88, window.innerHeight * 0.52, 480);
  canvas.width  = size;
  canvas.height = size;
  shadow.style.width  = (size + 24) + 'px';
  shadow.style.height = (size + 24) + 'px';
  shadow.style.left   = '-12px';
  shadow.style.top    = '-12px';
  RADIUS = size / 2 - 6;
  CX = size / 2;
  CY = size / 2;
  drawWheel(currentAngle);
}

// ─────────────────────────────────────────────
//  WHEEL RENDERER
// ─────────────────────────────────────────────
function drawWheel(rotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(CX, CY);

  // Outer decorative ring (dark)
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS + 4, 0, Math.PI * 2);
  ctx.fillStyle = '#2a1800';
  ctx.fill();

  // Slices
  for (let i = 0; i < SLICE_COUNT; i++) {
    const startAngle = rotation + i * SLICE_ANGLE;
    const endAngle   = startAngle + SLICE_ANGLE;

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, RADIUS, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = PRIZES[i].color;
    ctx.fill();

    // Slice border
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Radial divider line (bright)
    ctx.save();
    ctx.rotate(startAngle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(RADIUS, 0);
    ctx.strokeStyle = 'rgba(255,215,0,0.8)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  // Prize labels
  for (let i = 0; i < SLICE_COUNT; i++) {
    const midAngle = rotation + i * SLICE_ANGLE + SLICE_ANGLE / 2;
    ctx.save();
    ctx.rotate(midAngle);

    const textR     = RADIUS * 0.65;
    const label     = PRIZES[i].label;
    const isLong    = label.length > 2;
    const fontSize  = isLong ? Math.max(12, RADIUS * 0.085) : Math.max(15, RADIUS * 0.1);

    ctx.font        = `bold ${fontSize}px Orbitron, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif`;
    ctx.fillStyle   = PRIZES[i].textColor;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur   = 4;

    // Draw text horizontally at the correct radius position
    ctx.save();
    ctx.translate(textR, 0);
    ctx.rotate(Math.PI / 2);
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  // Outer ring stroke
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth   = 3;
  ctx.shadowColor  = '#FFD700';
  ctx.shadowBlur   = 12;
  ctx.stroke();
  ctx.shadowBlur   = 0;

  // Inner gold ring
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur  = 15;
  ctx.fill();
  ctx.shadowBlur  = 0;

  // Center dark circle
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS * 0.11, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0a2e';
  ctx.fill();

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS * 0.045, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();

  ctx.restore();
}

// ─────────────────────────────────────────────
//  AUDIO ENGINE
// ─────────────────────────────────────────────
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTick() {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type            = 'triangle';
    osc.frequency.value = 900 + Math.random() * 200;
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
  } catch(e) {}
}

function playWin(prizeIndex) {
  if (!audioCtx) return;
  try {
    // Scale multiplier: bigger prize = higher pitch chord
    const baseFreqs = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
    const multiplier = 1 + prizeIndex * 0.06;
    baseFreqs.forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type            = 'sine';
      osc.frequency.value = freq * multiplier;
      const t = audioCtx.currentTime + i * 0.11;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t);
      osc.stop(t + 0.5);
    });
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  SPIN ENGINE
// ─────────────────────────────────────────────
let isSpinning      = false;
let currentAngle    = -Math.PI / 2 - SLICE_ANGLE / 2; // initial position
let angularVelocity = 0;
let totalSpun       = 0;
let targetIndex     = 0;
let animId          = null;
let lastSliceIndex  = -1;

// Pointer is at top (angle = -PI/2 from canvas perspective)
// Slice i occupies angles [i*SLICE_ANGLE, (i+1)*SLICE_ANGLE]
// With rotation R, the angle under pointer is: (-PI/2 - R) mod 2PI
function getIndexUnderPointer(rotation) {
  let a = ((-Math.PI / 2 - rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(a / SLICE_ANGLE) % SLICE_COUNT;
}

function spin() {
  if (isSpinning) return;
  ensureAudio();

  isSpinning      = true;
  totalSpun       = 0;
  angularVelocity = 0.28 + Math.random() * 0.18;
  targetIndex     = Math.floor(Math.random() * SLICE_COUNT);
  lastSliceIndex  = getIndexUnderPointer(currentAngle);

  hideResult();
  document.getElementById('spin-btn').disabled = true;
  animId = requestAnimationFrame(animate);
}

const MIN_SPIN_RAD = MIN_ROTATIONS * 2 * Math.PI;

function animate() {
  currentAngle += angularVelocity;
  totalSpun    += angularVelocity;

  // Tick sound on slice boundary crossing
  const curSlice = getIndexUnderPointer(currentAngle);
  if (curSlice !== lastSliceIndex) {
    lastSliceIndex = curSlice;
    playTick();
  }

  // Apply friction after minimum spin
  if (totalSpun >= MIN_SPIN_RAD) {
    angularVelocity *= FRICTION;
  }

  drawWheel(currentAngle);

  if (totalSpun >= MIN_SPIN_RAD && angularVelocity < STOP_THRESHOLD) {
    snapAndStop();
    return;
  }

  animId = requestAnimationFrame(animate);
}

function snapAndStop() {
  // Compute the exact angle that places targetIndex center under pointer
  // Pointer at -PI/2. Slice center = targetIndex * SLICE_ANGLE + SLICE_ANGLE/2
  // We want: (-PI/2 - finalAngle) mod 2PI = targetIndex * SLICE_ANGLE + SLICE_ANGLE/2
  // => finalAngle = -PI/2 - (targetIndex * SLICE_ANGLE + SLICE_ANGLE/2) + n*2PI
  const sliceCenter = targetIndex * SLICE_ANGLE + SLICE_ANGLE / 2;
  let   finalAngle  = -Math.PI / 2 - sliceCenter;

  // Normalize so finalAngle is close to currentAngle (just past it)
  while (finalAngle < currentAngle) finalAngle += 2 * Math.PI;
  // If it jumped too far, bring back one full rotation
  if (finalAngle - currentAngle > Math.PI) finalAngle -= 2 * Math.PI;

  // Quick ease-out tween to finalAngle
  const startAngle = currentAngle;
  const delta      = finalAngle - startAngle;
  const FRAMES     = 30;
  let   frame      = 0;

  function tween() {
    frame++;
    const t = frame / FRAMES;
    const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
    currentAngle = startAngle + delta * ease;
    drawWheel(currentAngle);

    if (frame < FRAMES) {
      animId = requestAnimationFrame(tween);
    } else {
      currentAngle = finalAngle;
      drawWheel(currentAngle);
      onSpinEnd();
    }
  }
  animId = requestAnimationFrame(tween);
}

function onSpinEnd() {
  isSpinning = false;
  playWin(targetIndex);
  showResult(targetIndex);
  document.getElementById('spin-btn').disabled = false;
  setTimeout(() => showModal(targetIndex), 700);
}

// ─────────────────────────────────────────────
//  UI CONTROLLER
// ─────────────────────────────────────────────
function showResult(index) {
  const prize   = PRIZES[index];
  const banner  = document.getElementById('result-banner');
  const text    = document.getElementById('result-text');
  text.textContent = `🎉 ${prize.label} 당첨!`;
  banner.classList.add('visible');
}

function hideResult() {
  document.getElementById('result-banner').classList.remove('visible');
}

function showModal(index) {
  const prize  = PRIZES[index];
  const modal  = document.getElementById('modal');
  const mPrize = document.getElementById('modal-prize');
  mPrize.textContent = prize.label;
  mPrize.style.color = prize.textColor === '#FFD700' ? '#FFD700' : prize.textColor;
  modal.classList.add('visible');
  launchConfetti();
}

function hideModal() {
  document.getElementById('modal').classList.remove('visible');
}

// ─────────────────────────────────────────────
//  CONFETTI
// ─────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD700','#FF4444','#44FF88','#4488FF','#FF88FF','#FFAA00','#FF6600'];

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    setTimeout(() => spawnConfetti(), i * 18);
  }
}

function spawnConfetti() {
  const el = document.createElement('div');
  el.className = 'confetti-piece';
  const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
  const dur   = 1.8 + Math.random() * 1.5;
  const left  = Math.random() * 100;
  const drift = (Math.random() - 0.5) * 200;
  el.style.cssText = `
    left: ${left}vw;
    background: ${color};
    --dur: ${dur}s;
    --drift: ${drift}px;
    width: ${6 + Math.random() * 6}px;
    height: ${6 + Math.random() * 6}px;
    border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 200);
}

// ─────────────────────────────────────────────
//  BACKGROUND STARS
// ─────────────────────────────────────────────
function generateStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = 1 + Math.random() * 2.5;
    const dur  = 1.5 + Math.random() * 3;
    star.style.cssText = `
      width:  ${size}px;
      height: ${size}px;
      left:   ${Math.random() * 100}vw;
      top:    ${Math.random() * 100}vh;
      --dur:  ${dur}s;
      animation-delay: ${Math.random() * dur}s;
    `;
    container.appendChild(star);
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  generateStars();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  document.getElementById('spin-btn').addEventListener('click', spin);
  document.getElementById('modal-close').addEventListener('click', () => {
    hideModal();
    hideResult();
  });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) {
      hideModal();
      hideResult();
    }
  });
});
</script>
</body>
</html>
